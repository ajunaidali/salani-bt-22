<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Box Shadow Examples</title>
  <link rel="stylesheet" href="style.css">
  
</head>
<body>
  <h1>boxshadow</h1>

  <div class="wrapper">
    <div class="row">
      <div class="item">
        <h2>outer-glow</h2>
        <div class="box outer-glow"></div>
      </div>
      <div class="item">
        <h2>outer-soft</h2>
        <div class="box outer-soft"></div>
      </div>
      <div class="item">
        <h2>outer-sharp</h2>
        <div class="box outer-sharp"></div>
      </div>
    </div>

    <div class="row">
      <div class="item">
        <h2>inset-glow</h2>
        <div class="box inset-glow"></div>
      </div>
      <div class="item">
        <h2>inset-soft</h2>
        <div class="box inset-soft"></div>
      </div>
      <div class="item">
        <h2>inset-sharp</h2>
        <div class="box inset-sharp"></div>
      </div>
    </div>
  </div>
</body>
</html>
