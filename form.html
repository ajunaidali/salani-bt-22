<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Student Registration Form</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      background: linear-gradient(135deg, #dbe9f4 0%, #f7f1ff 100%);
      color: #2e3a4f;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      margin: 0;
    }
    .container {
      width: 660px;
      max-width: 95%;
      background: #ffffff;
      border: 1px solid #cad3e6;
      border-radius: 14px;
      padding: 30px 28px;
      box-shadow: 0 18px 35px rgba(78, 99, 147, 0.14);
    }
    .container h1 {
      text-align: center;
      margin: 0 0 22px;
      font-size: 24px;
      letter-spacing: 0.5px;
    }
    .form-row {
      display: flex;
      flex-wrap: wrap;
      gap: 12px;
      margin-bottom: 16px;
      align-items: center;
    }
    .form-row label {
      flex: 0 0 150px;
      font-weight: 600;
    }
    .form-row input[type="text"],
    .form-row input[type="email"],
    .form-row input[type="password"],
    .form-row select,
    .form-row textarea,
    .form-row input[type="file"] {
      flex: 1;
      padding: 9px 10px;
      border: 1px solid #d9b5b0;
      border-radius: 6px;
      font-size: 14px;
      background: #fff;
    }
    .half {
      flex: 1 1 calc(50% - 6px);
    }
    .small {
      width: 100px;
    }
    .checkbox-group,
    .radio-group {
      display: flex;
      gap: 12px;
      flex-wrap: wrap;
      align-items: center;
    }
    .checkbox-group label,
    .radio-group label {
      font-weight: 400;
      display: flex;
      align-items: center;
      gap: 6px;
    }
    textarea {
      min-height: 90px;
      resize: vertical;
    }
    .submit-row {
      text-align: center;
      margin-top: 10px;
    }
    button {
      background: #d66d7f;
      color: white;
      border: none;
      border-radius: 8px;
      padding: 10px 24px;
      font-size: 15px;
      cursor: pointer;
      transition: background 0.2s ease;
    }
    button:hover {
      background: #c45569;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>Student Registration Form</h1>
    <form>
      <div class="form-row">
        <label for="roll">Roll no. :</label>
        <input id="roll" type="text" placeholder="Roll number">
      </div>
      <div class="form-row">
        <label for="student-name">Student name :</label>
        <input id="student-first" class="half" type="text" placeholder="First Name">
        <input id="student-last" class="half" type="text" placeholder="Last Name">
      </div>
      <div class="form-row">
        <label for="father-name">Father&apos;s name :</label>
        <input id="father-name" type="text" placeholder="Father&apos;s Name">
      </div>
      <div class="form-row">
        <label>Date of birth :</label>
        <input type="date" class="small" placeholder="DD">
      </div>
      <div class="form-row">
        <label>Mobile no. :</label>
        <input type="text" placeholder="Mobile Number">
      </div>
      <div class="form-row">
        <label for="email">Email id :</label>
        <input id="email" type="email" placeholder="Email Address">
      </div>
      <div class="form-row">
        <label for="password">Password :</label>
        <input id="password" type="password" placeholder="Password">
      </div>
      <div class="form-row">
        <label>Gender :</label>
        <div class="radio-group">
          <label><input type="radio" name="gender"> Male</label>
          <label><input type="radio" name="gender"> Female</label>
        </div>
      </div>
      <div class="form-row">
        <label>Department :</label>
        <div class="checkbox-group">
          <label><input type="checkbox"> CSE</label>
          <label><input type="checkbox"> IT</label>
          <label><input type="checkbox"> AI and ML</label>
          <label><input type="checkbox"> Data Science</label>
        
        </div>
      </div>
      <div class="form-row">
        <label for="course">Course :</label>
        <select id="course">
          <option>Select Current Course</option>
          <option>B.Tech</option>
          <option>M.Tech</option>
          <option>BCA</option>
          <option>MCA</option>
        </select>
      </div>
      <div class="form-row">
        <label for="photo">Student photo :</label>
        <input id="photo" type="file">
      </div>
      <div class="form-row">
        <label for="city">City :</label>
        <input id="city" type="text" placeholder="City">
      </div>
      <div class="form-row">
        <label for="address">Address :</label>
        <textarea id="address" placeholder="Address"></textarea>
      </div>
      <div class="submit-row">
        <button type="submit">Register</button>
      </div>
    </form>
  </div>
</body>
</html>
